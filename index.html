<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedLab Pro System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f5f9; }
      .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: all 0.3s; }
      .card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
      .btn { transition: all 0.2s; }
      .btn:active { transform: scale(0.98); }
      .input { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; width: 100%; outline: none; transition: border 0.2s; }
      .input:focus { border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;
      const API_URL = 'https://medlab-api-ib9d.onrender.com/api';

      function App() {
        const [mode, setMode] = useState('lab');
        
        return (
          <div className="min-h-screen">
            <nav className="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-50">
              <h1 className="text-xl font-extrabold text-teal-600">MedLab Pro</h1>
              <div className="flex gap-2 bg-gray-100 p-1 rounded-xl">
                <button onClick={() => setMode('lab')} className={`px-4 py-2 rounded-lg font-bold text-sm ${mode === 'lab' ? 'bg-white shadow text-teal-600' : 'text-gray-500'}`}>Lab Staff</button>
                <button onClick={() => setMode('patient')} className={`px-4 py-2 rounded-lg font-bold text-sm ${mode === 'patient' ? 'bg-white shadow text-teal-600' : 'text-gray-500'}`}>Patient</button>
              </div>
            </nav>
            
            {mode === 'lab' ? <LabDashboard /> : <PatientApp />}
          </div>
        );
      }

      function LabDashboard() {
        const [tab, setTab] = useState(1);
        const [tests, setTests] = useState([]);
        const [patients, setPatients] = useState([]);
        const [appointments, setAppointments] = useState([]);
        
        const [newPatient, setNewPatient] = useState({ name: '', phone: '', sex: 'Male' });
        const [newApt, setNewApt] = useState({ patientId: '', testIds: [], date: '', type: 'in_lab' });
        const [resultData, setResultData] = useState({ appointmentId: '', results: [] });

        const fetchData = async () => {
          const tRes = await axios.get(`${API_URL}/tests`);
          setTests(tRes.data);
          const aRes = await axios.get(`${API_URL}/appointments`);
          setAppointments(aRes.data);
          const pMap = new Map();
          aRes.data.forEach(a => pMap.set(a.patient.id, a.patient));
          setPatients(Array.from(pMap.values()));
        };

        useEffect(() => { fetchData(); }, []);

        const generateCode = () => `LAB-${Math.random().toString(36).substring(2, 7).toUpperCase()}`;

        const handleCreatePatient = async (e) => {
          e.preventDefault();
          await axios.post(`${API_URL}/patients/create`, { ...newPatient, uniqueCode: generateCode(), dob: '1990-01-01', bloodType: 'O+' });
          alert('Patient created!');
          fetchData();
        };

        const handleTestSelect = (testId) => {
          setNewApt(prev => {
            const ids = prev.testIds.includes(testId) ? prev.testIds.filter(id => id !== testId) : [...prev.testIds, testId];
            return { ...prev, testIds: ids };
          });
        };

        const handleCreateApt = async (e) => {
          e.preventDefault();
          await axios.post(`${API_URL}/appointments/create`, { ...newApt, scheduledTime: newApt.date });
          alert('Appointment booked!');
          fetchData();
        };

        const handleResultChange = (testId, field, value) => {
          setResultData(prev => {
            const results = [...prev.results];
            const idx = results.findIndex(r => r.testId === testId);
            if (idx > -1) results[idx][field] = value;
            else results.push({ testId, [field]: value });
            return { ...prev, results };
          });
        };

        const handleSaveResults = async (e) => {
          e.preventDefault();
          const apt = appointments.find(a => a.id === resultData.appointmentId);
          await axios.post(`${API_URL}/results/enter`, { 
            appointmentId: resultData.appointmentId, 
            patientId: apt.patientId, 
            results: resultData.results 
          });
          alert('Results saved!');
          fetchData();
        };

        return (
          <div className="p-8 max-w-6xl mx-auto">
            <div className="flex gap-2 mb-8 border-b">
              {[1, 2, 3].map(t => (
                <button key={t} onClick={() => setTab(t)} className={`px-6 py-3 font-bold ${tab === t ? 'text-teal-600 border-b-2 border-teal-600' : 'text-gray-400'}`}>
                  {t === 1 ? 'Patients' : t === 2 ? 'Appointments' : 'Results'}
                </button>
              ))}
            </div>

            {tab === 1 && (
              <div className="card p-8">
                <h2 className="text-xl font-bold mb-6">Register New Patient</h2>
                <form onSubmit={handleCreatePatient} className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <input className="input" placeholder="Full Name" onChange={e => setNewPatient({...newPatient, name: e.target.value})} required />
                  <input className="input" placeholder="Phone" onChange={e => setNewPatient({...newPatient, phone: e.target.value})} required />
                  <select className="input" onChange={e => setNewPatient({...newPatient, sex: e.target.value})}>
                    <option>Male</option><option>Female</option>
                  </select>
                  <button type="submit" className="btn bg-teal-600 text-white p-3 rounded-lg font-bold md:col-span-3">Generate Code</button>
                </form>
              </div>
            )}

            {tab === 2 && (
              <div className="card p-8">
                <h2 className="text-xl font-bold mb-6">Book Appointment</h2>
                <form onSubmit={handleCreateApt} className="space-y-4">
                  <select className="input" onChange={e => setNewApt({...newApt, patientId: e.target.value})} required>
                    <option value="">Select Patient</option>
                    {patients.map(p => <option key={p.id} value={p.id}>{p.fullName}</option>)}
                  </select>
                  <div className="grid grid-cols-2 gap-4">
                    <input type="datetime-local" className="input" onChange={e => setNewApt({...newApt, date: e.target.value})} required />
                    <select className="input" onChange={e => setNewApt({...newApt, type: e.target.value})}>
                      <option value="in_lab">In Lab</option><option value="home_service">Home Service</option>
                    </select>
                  </div>
                  <div className="max-h-60 overflow-y-auto border rounded-lg p-4 space-y-2">
                    {tests.map(test => (
                      <label key={test.id} className="flex items-center gap-3 cursor-pointer hover:bg-gray-50 p-2 rounded">
                        <input type="checkbox" checked={newApt.testIds.includes(test.id)} onChange={() => handleTestSelect(test.id)} className="w-5 h-5 text-teal-600" />
                        <span className="flex-1 font-medium">{test.name}</span>
                        <span className="text-teal-600 font-bold">${test.price}</span>
                      </label>
                    ))}
                  </div>
                  <button type="submit" className="btn bg-blue-600 text-white p-3 rounded-lg font-bold w-full">Book Appointment</button>
                </form>
              </div>
            )}

            {tab === 3 && (
              <div className="card p-8">
                <h2 className="text-xl font-bold mb-6">Enter Results</h2>
                <form onSubmit={handleSaveResults} className="space-y-4">
                  <select className="input" onChange={e => setResultData({ ...resultData, appointmentId: e.target.value, results: [] })} required>
                    <option value="">Select Appointment</option>
                    {appointments.map(a => <option key={a.id} value={a.id}>{a.patient.fullName} - {new Date(a.scheduledTime).toLocaleDateString()}</option>)}
                  </select>
                  
                  {resultData.appointmentId && (
                    <div className="space-y-4 border-t pt-4">
                      {appointments.find(a => a.id === resultData.appointmentId)?.tests.map(aptTest => (
                        <div key={aptTest.testId} className="bg-gray-50 p-4 rounded-xl">
                          <h4 className="font-bold mb-3">{aptTest.test.name}</h4>
                          <div className="grid grid-cols-2 gap-3">
                            <input className="input p-2" placeholder="Result Value" onChange={e => handleResultChange(aptTest.testId, 'resultValue', e.target.value)} required />
                            <input className="input p-2" placeholder="Unit (e.g mg/dL)" onChange={e => handleResultChange(aptTest.testId, 'unit', e.target.value)} />
                            <input className="input p-2" placeholder="Ref Range (e.g 4-10)" onChange={e => handleResultChange(aptTest.testId, 'referenceRange', e.target.value)} />
                            <select className="input p-2" onChange={e => handleResultChange(aptTest.testId, 'flag', e.target.value)}>
                              <option value="normal">Normal</option><option value="high">High</option><option value="low">Low</option><option value="critical">Critical</option>
                            </select>
                          </div>
                        </div>
                      ))}
                      <button type="submit" className="btn bg-green-600 text-white p-3 rounded-lg font-bold w-full">Save Results</button>
                    </div>
                  )}
                </form>
              </div>
            )}
          </div>
        );
      }

      function PatientApp() {
        const [patient, setPatient] = useState(null);
        const [code, setCode] = useState('');
        const [results, setResults] = useState([]);
        const canvasRef = useRef(null);

        const handleLogin = async (e) => {
          e.preventDefault();
          try {
            const res = await axios.post(`${API_URL}/patients/login`, { uniqueCode: code });
            setPatient(res.data);
            const rRes = await axios.get(`${API_URL}/patients/${res.data.id}/results`);
            setResults(rRes.data);
          } catch {
            alert('Invalid code');
          }
        };

        useEffect(() => {
          if (patient && results.length > 0 && canvasRef.current) {
            const ctx = canvasRef.current.getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
              type: 'line',
              data: {
                labels: results.map(r => new Date(r.createdAt).toLocaleDateString()),
                datasets: [{
                  label: 'Result Trend',
                  data: results.map(r => parseFloat(r.resultValue) || 0),
                  borderColor: '#0d9488', tension: 0.4, fill: true, backgroundColor: 'rgba(13, 148, 136, 0.1)'
                }]
              }
            });
          }
        }, [patient, results]);

        if (!patient) {
          return (
            <div className="flex items-center justify-center min-h-[80vh]">
              <form onSubmit={handleLogin} className="card p-8 w-full max-w-md">
                <h2 className="text-2xl font-bold mb-6 text-center text-gray-800">Patient Login</h2>
                <input className="input mb-4 text-center text-lg tracking-widest" placeholder="Enter Your Access Code" value={code} onChange={e => setCode(e.target.value)} required />
                <button type="submit" className="btn bg-teal-600 text-white p-3 rounded-lg font-bold w-full">View My Results</button>
              </form>
            </div>
          );
        }

        return (
          <div className="p-8 max-w-4xl mx-auto">
            <div className="card p-8 mb-8 flex justify-between items-center">
              <div>
                <h2 className="text-2xl font-bold text-gray-800">{patient.fullName}</h2>
                <p className="text-gray-500">{patient.sex} • {patient.bloodType} Blood</p>
              </div>
              <button onClick={() => setPatient(null)} className="text-red-500 font-bold">Logout</button>
            </div>

            {results.length > 0 ? (
              <>
                <div className="card p-8 mb-8">
                  <h3 className="text-xl font-bold mb-4">Health Trends</h3>
                  <canvas ref={canvasRef}></canvas>
                </div>
                <div className="space-y-4">
                  {results.map(r => (
                    <div key={r.id} className="card p-6 flex justify-between items-center">
                      <div>
                        <h4 className="font-bold">{r.test.name}</h4>
                        <p className="text-sm text-gray-400">{new Date(r.createdAt).toLocaleDateString()}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-2xl font-bold text-gray-800">{r.resultValue} <span className="text-sm font-normal text-gray-400">{r.unit}</span></p>
                        <span className={`text-xs px-2 py-1 rounded ${r.flag === 'high' ? 'bg-red-100 text-red-600' : r.flag === 'low' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}`}>{r.flag}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <div className="card p-8 text-center text-gray-500">No results available yet.</div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
