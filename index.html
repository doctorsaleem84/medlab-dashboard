<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedLab Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const API_URL = 'https://medlab-api-ib9d.onrender.com/api';

      function App() {
        const [tests, setTests] = useState([]);
        const [formData, setFormData] = useState({ name: '', phone: '', dob: '1990-01-01', sex: 'Male' });
        const [expense, setExpense] = useState({ category: 'Materials', description: '', amount: 0 });
        const [dates, setDates] = useState({ startDate: '', endDate: '' });

        useEffect(() => {
          axios.get(`${API_URL}/tests`).then(res => setTests(res.data)).catch(err => console.error("API Error: ", err));
        }, []);

        const generateCode = () => `LAB-${Math.random().toString(36).substring(2, 7).toUpperCase()}`;

        const handleCreatePatient = async (e) => {
          e.preventDefault();
          try {
            await axios.post(`${API_URL}/patients/create`, { ...formData, uniqueCode: generateCode(), bloodType: 'O+' });
            alert('Patient created! They can now log in to the mobile app.');
          } catch (err) { alert('Error creating patient. Is the backend awake?'); }
        };

        const handleAddExpense = async (e) => {
          e.preventDefault();
          await axios.post(`${API_URL}/expenses`, expense);
          alert('Expense logged successfully!');
        };

        const handleDownloadCSV = async () => {
          try {
            const response = await axios.get(`${API_URL}/export/csv`, { params: dates, responseType: 'blob' });
            const url = window.URL.createObjectURL(new Blob([response.data]));
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'medlab-report.csv');
            document.body.appendChild(link);
            link.click();
          } catch (err) { alert('Error downloading report'); }
        };

        return (
          <div className="p-8 bg-gray-50 min-h-screen">
            <h1 className="text-3xl font-bold text-gray-800 mb-8">MedLab Staff Dashboard</h1>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
              <div className="bg-white p-6 rounded-xl shadow-md">
                <h2 className="text-xl font-bold mb-4">Register New Patient</h2>
                <form onSubmit={handleCreatePatient} className="space-y-4">
                  <input className="w-full p-2 border rounded" placeholder="Full Name" onChange={e => setFormData({...formData, name: e.target.value})} required />
                  <input className="w-full p-2 border rounded" placeholder="Phone Number" onChange={e => setFormData({...formData, phone: e.target.value})} required />
                  <select className="w-full p-2 border rounded" onChange={e => setFormData({...formData, sex: e.target.value})}>
                    <option>Male</option><option>Female</option>
                  </select>
                  <button type="submit" className="bg-teal-600 text-white px-4 py-2 rounded font-bold w-full">Generate Access Code</button>
                </form>
              </div>
              <div className="bg-white p-6 rounded-xl shadow-md">
                <h2 className="text-xl font-bold mb-4">Test Catalog & Pricing</h2>
                <div className="max-h-72 overflow-y-auto">
                  {tests.map(test => (
                    <div key={test.id} className="border-b py-2 flex justify-between">
                      <div>
                        <p className="font-semibold">{test.name}</p>
                        <p className="text-xs text-gray-500">{test.category} - {test.turnaroundHours}h turnaround</p>
                      </div>
                      <p className="font-bold text-teal-600">${test.price}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div className="bg-white p-6 rounded-xl shadow-md">
                <h2 className="text-xl font-bold mb-4">Log Expenditure</h2>
                <form onSubmit={handleAddExpense} className="space-y-4">
                  <select className="w-full p-2 border rounded" onChange={e => setExpense({...expense, category: e.target.value})}>
                    <option>Materials</option><option>Rent</option><option>Utilities</option><option>Salaries</option><option>Other</option>
                  </select>
                  <input className="w-full p-2 border rounded" placeholder="Description (e.g. Test tubes)" onChange={e => setExpense({...expense, description: e.target.value})} required />
                  <input type="number" className="w-full p-2 border rounded" placeholder="Amount ($)" onChange={e => setExpense({...expense, amount: e.target.value})} required />
                  <button type="submit" className="bg-red-500 text-white px-4 py-2 rounded font-bold w-full">Log Expense</button>
                </form>
              </div>
              <div className="bg-white p-6 rounded-xl shadow-md">
                <h2 className="text-xl font-bold mb-4">Generate Spreadsheet (CSV)</h2>
                <p className="text-sm text-gray-500 mb-4">Export patient tests and payment details for a specific time period.</p>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium">Start Date</label>
                    <input type="date" className="w-full p-2 border rounded" onChange={e => setDates({...dates, startDate: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium">End Date</label>
                    <input type="date" className="w-full p-2 border rounded" onChange={e => setDates({...dates, endDate: e.target.value})} />
                  </div>
                  <button onClick={handleDownloadCSV} className="bg-blue-600 text-white px-4 py-2 rounded font-bold w-full">Download Report</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
